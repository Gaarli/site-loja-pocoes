<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração - Poções e Soluções</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Painel de Administração</h1>
        <p>Área exclusiva para gestão de estoque.</p>
        <nav>
            <a href="index.html">Voltar para a Loja</a>
        </nav>
    </header>

    <main>
        <section class="admin-formulario">
            <h2>Cadastrar Nova Poção</h2>
            <form id="form-pocao">
                <div class="campo">
                    <label for="nome">Nome da Poção:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="campo">
                    <label for="descricao">Descrição:</label>
                    <textarea id="descricao" name="descricao" rows="4" required></textarea>
                </div>

                <div class="campo">
                    <label for="imagem">Caminho ou URL da Imagem:</label>
                    <input type="text" id="imagem" name="imagem" placeholder="Ex: assets/images/pocao.jpg" required>
                </div>

                <div class="campo">
                    <label for="preco">Valor (moedas):</label>
                    <input type="number" id="preco" name="preco" required>
                </div>

                <button type="submit">Cadastrar Poção</button>
            </form>
        </section>

        <section class="admin-estoque">
            <h2>Estoque Atual</h2>
            <div id="lista-admin">
                <p>Carregando poções cadastradas...</p>
            </div>
        </section>
    </main>

    <script src="js/admin.js"></script>
</body>
</html>
